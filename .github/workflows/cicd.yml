name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# Required by aws-actions/configure-aws-credentials when using OIDC.
# Harmless when using static keys.
permissions:
  id-token: write
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:2.5.2
        ports: ['8000:8000']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Wait for DynamoDB Local
        run: |
          # DDB Local responds to GET / with a 4xx/5xx (it expects POST).
          # We just want to know the port answers, so curl without -f.
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8000; then
              echo "DDB Local ready"; exit 0
            fi
            sleep 1
          done
          echo "DDB Local did not become ready"; exit 1

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Lint (advisory)
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Test (unit + integration) with coverage report (advisory)
        working-directory: backend
        # Tests are advisory in CI by user request: failing tests must
        # NOT block deploy. Coverage thresholds also disabled.
        continue-on-error: true
        run: |
          npx vitest run --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint (advisory)
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Test with coverage report (advisory)
        working-directory: frontend
        # Tests are advisory in CI by user request: failing tests must
        # NOT block deploy. Coverage thresholds also disabled.
        continue-on-error: true
        run: |
          npx vitest run --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Upload frontend dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy-backend:
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.outputs.outputs.api-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Build bundle
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: SAM deploy
        working-directory: backend
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --stack-name "${SAM_STACK_NAME:-avacom}"

      - name: Capture API URL
        id: outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${SAM_STACK_NAME:-avacom}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api-url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed API: ${API_URL}"

  deploy-frontend:
    needs: [deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Resolve CloudFront stack outputs
        id: cf
        run: |
          STACK="${CF_STACK_NAME:-avacom-cloudfront}"
          WEB_BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" --output text)
          DIST_ID=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          DIST_DOMAIN=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" --output text)
          echo "web-bucket=${WEB_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "dist-id=${DIST_ID}" >> "$GITHUB_OUTPUT"
          echo "dist-domain=${DIST_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Sync hashed assets (immutable cache)
        run: |
          aws s3 sync frontend/dist/ "s3://${{ steps.cf.outputs.web-bucket }}" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync HTML (no-cache)
        run: |
          aws s3 sync frontend/dist/ "s3://${{ steps.cf.outputs.web-bucket }}" \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.dist-id }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "Deployed to: https://${{ steps.cf.outputs.dist-domain }}" >> "$GITHUB_STEP_SUMMARY"
          echo "API: ${{ needs.deploy-backend.outputs.api-url }}" >> "$GITHUB_STEP_SUMMARY"
