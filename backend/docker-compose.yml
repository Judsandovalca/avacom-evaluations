services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: avacom-ddb-local
    networks: [avacom-net]
    ports:
      - "8000:8000"
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 | grep -q 'DynamoDB Local'"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  avacom-net:
    name: avacom-net
