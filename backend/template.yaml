AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AVACOM Evaluations API (single Lambda + DynamoDB)

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  LambdaArchitecture:
    Type: String
    Default: arm64
    AllowedValues: [arm64, x86_64]
    Description: Use x86_64 for local SAM dev on x86 hosts; arm64 saves cost in prod.

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 512
    Architectures: [!Ref LambdaArchitecture]
    Environment:
      Variables:
        NODE_OPTIONS: '--enable-source-maps'
        EVALUATIONS_TABLE: !Ref EvaluationsTable
        USERS_TABLE: !Ref UsersTable
        COURSES_TABLE: !Ref CoursesTable
        JWT_SECRET: !Sub '{{resolve:secretsmanager:${JwtSecret}:SecretString:secret}}'
        APP_VERSION: '1.0.0'
        POWERTOOLS_SERVICE_NAME: avacom-api
        POWERTOOLS_LOG_LEVEL: INFO
        DDB_ENDPOINT: ''
        COOKIE_SECURE: 'true'

Resources:
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub avacom-jwt-secret-${Stage}
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: secret
        PasswordLength: 64
        ExcludePunctuation: true

  EvaluationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub avacom-evaluations-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: evaluationId, AttributeType: S }
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: evaluationId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: userId-createdAt-index
          KeySchema:
            - { AttributeName: userId, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub avacom-users-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: email, AttributeType: S }
      KeySchema:
        - { AttributeName: email, KeyType: HASH }

  CoursesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub avacom-courses-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: courseId, AttributeType: S }
      KeySchema:
        - { AttributeName: courseId, KeyType: HASH }

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: [Content-Type, Authorization]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub avacom-api-${Stage}
      CodeUri: dist/
      Handler: handler.handler
      Tracing: Active
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref EvaluationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CoursesTable }
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref JwtSecret
      Events:
        AnyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub avacom-api-url-${Stage}
  EvaluationsTableName:
    Value: !Ref EvaluationsTable
  UsersTableName:
    Value: !Ref UsersTable
  CoursesTableName:
    Value: !Ref CoursesTable
